<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in · Xano MCP Chat</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <h1 class="auth-title">Sign in</h1>
        <p class="auth-lead">Use your DealDetails account. Your token is stored in this browser only and sent on chat requests for MCP access.</p>
        <form id="login-form" class="auth-form" novalidate>
          <label class="auth-label" for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="username"
            required
            class="auth-input"
          />
          <label class="auth-label" for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
            class="auth-input"
          />
          <p id="login-error" class="auth-error" role="alert" hidden></p>
          <button type="submit" class="auth-submit" id="login-submit">Sign in</button>
        </form>
      </div>
    </div>
    <script src="/login.js" type="module"></script>
  </body>
</html>
